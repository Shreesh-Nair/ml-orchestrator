name: Packaging Precheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  packaging-precheck:
    name: Packaging precheck (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Check NumPy major version
        run: |
          python - <<'PY'
import numpy as np, sys, re
v = np.__version__
print('numpy', v)
m = re.match(r'^(\d+)\.', v)
major = int(m.group(1)) if m else 0
if major >= 2:
    print('ERROR: NumPy major version >= 2 detected; packaging should pin numpy<2 to avoid ABI mismatches')
    sys.exit(1)
else:
    print('NumPy major version is OK for packaging')
PY
