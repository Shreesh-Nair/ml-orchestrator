name: Packaging Precheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  packaging-precheck:
    name: Packaging precheck (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Check NumPy major version
        run: |
          python scripts\check_packaging_env.py
