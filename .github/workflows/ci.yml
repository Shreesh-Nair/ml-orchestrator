name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Upgrade pip
        shell: pwsh
        run: python -m pip install --upgrade pip

      - name: Install runtime deps (pin NumPy < 2 to avoid compatibility issues)
        shell: pwsh
        run: |
          python -m pip install "numpy<2" "pandas<2.2" "PySide6>=6.6,<6.7" "scikit-learn==1.5.2" "pyyaml<7.0" "mlflow<3.0" "opencv-python-headless<4.11" pytest pyinstaller

      - name: Run tests (JUnit XML)
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          if (Test-Path reports) { Remove-Item -Recurse -Force reports }
          New-Item -ItemType Directory -Path reports | Out-Null
          # Ensure a small synthetic fraud dataset exists for tests (large real dataset is gitignored)
          python scripts\ensure_test_data.py
          python -m pytest -q --junitxml=reports/junit.xml

      - name: Run quick-fix recommender on examples
        shell: pwsh
        run: |
          python scripts\apply_recommender_to_examples.py


      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml

      - name: Build PyInstaller exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean "ml_orchestrator_demo.spec"

      - name: Upload built exe
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ml-orchestrator-exe
          path: dist/MLOrchestratorDemo/MLOrchestratorDemo.exe
