pipeline_name: house_price_regression
stages:
  - name: load_data
    type: csv_loader
    params:
      source: data/housing.csv
      target_column: median_house_value

  - name: preprocess
    type: tabular_preprocess
    params:
      target_column: median_house_value
      task_type: regression

  - name: model
    type: regression
    params:
      n_estimators: 100
      max_depth: null
